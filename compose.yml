name: faucet

services:
  caddy:
    image: caddy@sha256:fce4f15aad23222c0ac78a1220adf63bae7b94355d5ea28eee53910624acedfa # :alpine
    depends_on:
      - php-fpm
    ports:
      - "127.0.0.1:8080:80"
    restart: on-failure
    volumes:
      - ./docs/caddy/Caddyfile-dev:/etc/caddy/Caddyfile
      - ./web:/var/www/signet-faucet/web
      - caddy_config:/config
      - caddy_data:/data

  php-fpm:
    image: 1maa/php:8.5
    restart: on-failure
    env_file:
      - .env.dist
    volumes:
      - .:/var/www/signet-faucet
    working_dir: /var/www/signet-faucet

  valkey:
    image: valkey/valkey@sha256:84c96f47ebe197e635cd3ddbe3ab74e8bdf783cf3befbfb1c36387275c1cd5d5 # :9-alpine
    restart: on-failure
    volumes:
      - valkey_data:/data

  node:
    image: 1maa/bitcoin:latest
    healthcheck:
      test: netstat -ltn | grep 18443 > /dev/null
      start_interval: 125ms
      start_period: 500ms
    restart: on-failure
    volumes:
      - ./docs/knots/bitcoin.conf:/home/bitcoin/.bitcoin/bitcoin.conf
      - node_data:/home/bitcoin/.bitcoin

volumes:
  caddy_config:
  caddy_data:
  node_data:
  valkey_data:
